<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AR Chemistry Lab — Kalinga Laboratories</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
    </style>
  </head>
  <body>
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      renderer="antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
    >
      <a-marker preset="hiro">
        <!-- Beaker -->
        <a-cylinder
          position="0 0.5 0"
          radius="0.3"
          height="0.9"
          color="#00f5c4"
          opacity="0.4"
          wireframe="true"
        ></a-cylinder>
        <!-- Molecule H2O -->
        <a-sphere position="0 0.5 0" radius="0.12" color="#1af0ff" opacity="0.9"></a-sphere>
        <a-sphere position="0.18 0.55 0" radius="0.07" color="#e0faff" opacity="0.9"></a-sphere>
        <a-sphere position="-0.18 0.55 0" radius="0.07" color="#e0faff" opacity="0.9"></a-sphere>
        <!-- Label -->
        <a-text value="KALINGA CHEM LAB" position="0 1.1 0" align="center" color="#00f5c4" scale="0.5 0.5 0.5"></a-text>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
