<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AR Biology Lab — Kalinga Laboratories</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
    </style>
  </head>
  <body>
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="antialias: true; alpha: true"
      vr-mode-ui="enabled: false"
    >
      <a-marker preset="hiro">
        <!-- Human body silhouette -->
        <a-cylinder position="0 0.5 0" radius="0.2" height="0.8" color="#1af0ff" opacity="0.25" wireframe="true"></a-cylinder>
        <a-sphere position="0 1.0 0" radius="0.18" color="#1af0ff" opacity="0.3" wireframe="true"></a-sphere>
        <!-- Heart -->
        <a-sphere position="-0.05 0.65 0.05" radius="0.07" color="#ff2244" opacity="0.85"></a-sphere>
        <!-- Brain -->
        <a-sphere position="0 1.0 0.05" radius="0.1" color="#ffccaa" opacity="0.7"></a-sphere>
        <!-- Label -->
        <a-text value="KALINGA BIO LAB" position="0 1.4 0" align="center" color="#00f5c4" scale="0.5 0.5 0.5"></a-text>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
