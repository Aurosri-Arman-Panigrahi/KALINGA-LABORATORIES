<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kalinga Laboratories – Immersive Sci-Fi AR/VR Educational Ecosystem for Biology, Chemistry and Physics." />
    <meta name="theme-color" content="#020d18" />

    <!-- WebXR / Meta Quest compatibility -->
    <meta name="xr-spatial-tracking" content="true" />
    <meta name="mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="handheld-friendly" content="true" />

    <!-- PWA manifest for Quest home screen install -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="Kalinga Laboratories" />
    <meta property="og:description" content="Sci-Fi AR/VR Educational Ecosystem — Biology, Chemistry, Physics" />
    <meta property="og:image" content="/logo.png" />

    <!-- GitHub Pages SPA routing restore -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>

    <title>Kalinga Laboratories</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
